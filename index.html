<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Book</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

/* Hidden Sections */
#dashboard { display: none; }

/* Card */
.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
}

/* Input */
input {
  padding: 10px;
  margin: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
}

/* Button */
button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #00e6e6;
  cursor: pointer;
  font-weight: bold;
}

/* Game Boxes */
.game {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

/* Logout */
.logout {
  background: red;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>Silver Book</h1>

<!-- LOGIN -->
<div id="login" class="card">
  <h2>Login / Signup</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="card">
    <h2>Welcome, <span id="user"></span></h2>
    <p>💰 Balance: ₹<span id="balance"></span></p>
  </div>

  <div class="card">
    <h3>🎮 Games</h3>
    <div class="game">Casino Game</div>
    <div class="game">Cricket Betting</div>
    <div class="game">Live Game</div>
  </div>

  <div class="card">
    <h3>💰 Deposit</h3>
    <input type="number" id="amount" placeholder="Enter Amount">
    <button onclick="deposit()">Add Money</button>
  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<script>

// Check login on reload
if(localStorage.getItem("user")){
  showDashboard();
}

// LOGIN FUNCTION
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user && pass){
    localStorage.setItem("user", user);
    localStorage.setItem("balance", 1000); // default balance
    showDashboard();
  } else {
    alert("Enter details");
  }
}

// SHOW DASHBOARD
function showDashboard(){
  document.getElementById("login").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  document.getElementById("user").innerText = localStorage.getItem("user");
  document.getElementById("balance").innerText = localStorage.getItem("balance");
}

// DEPOSIT
function deposit(){
  let amt = parseInt(document.getElementById("amount").value);
  let balance = parseInt(localStorage.getItem("balance"));

  if(amt > 0){
    balance += amt;
    localStorage.setItem("balance", balance);
    document.getElementById("balance").innerText = balance;
    alert("Money Added!");
  }
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
