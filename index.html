<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Book</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#000,#1a1a1a);
    color:white;
    text-align:center;
}

/* HEADER */
h1 {
    color: gold;
    font-size: 42px;
    margin-top:20px;
    text-shadow:0 0 10px gold;
}

/* CARD */
.card {
    background:#111;
    margin:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,255,255,0.1);
}

/* OFFER TEXT */
.offer {
    font-size: 22px;
    color:#00ffcc;
    margin:10px 0;
    font-weight:bold;
}

/* BUTTONS */
.btn {
    display:block;
    width:85%;
    margin:15px auto;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* COLORS */
.whatsapp {
    background:#25D366;
    animation: blink 1s infinite;
}

.telegram {
    background:#0088cc;
}

.insta {
    background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}

/* BLINK */
@keyframes blink {
    0% {opacity:1;}
    50% {opacity:0.4;}
    100% {opacity:1;}
}

/* POPUP */
.popup {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    animation: fadeIn 1s;
}

.popup-box {
    background:#111;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 25px gold;
}

.close {
    margin-top:10px;
    padding:10px 20px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:8px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

</style>
</head>

<body>

<h1>🔥 SILVER BOOK 🔥</h1>

<div class="card">
    <div class="offer">🎯 IPL NEW ID AVAILABLE</div>
    <div class="offer">💰 20% BONUS + 5% DAILY</div>

    <a href="https://wa.me/+917347607874" class="btn whatsapp">💬 Join WhatsApp</a>
    <a href="https://t.me/silveronline24" class="btn telegram">📢 Join Telegram</a>
    <a href="https://www.instagram.com/silve_rbook2025?igsh=MWhvOGRwM2RjYXFzdA==" class="btn insta">📸 Follow Instagram</a>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h2>🔥 SILVER BOOK IPL ID</h2>
        <p>Get your ID instantly!</p>
        <a href="https://wa.me/+917347607874" class="btn whatsapp">Join Now</a>
        <button class="close" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
// Auto popup close after 5 sec
setTimeout(() => {
    document.getElementById("popup").style.display="none";
}, 5000);

function closePopup(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
