<!DOCTYPE html>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

/* Header */
header {
  padding: 30px;
}
h1 {
  color: #00e6e6;
  font-size: 40px;
}

/* Glass Effect Box */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 20px;
  margin: 20px auto;
  width: 90%;

}

/* Buttons */
.btn {
  display: block;

  border-radius: 25px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  transition: 0.3s;

.btn:hover {

}

.whatsapp { background:#25D366; }
.telegram { background:#0088cc; }
.instagram { background:#E1306C; }

/* Input */
input {
  width: 90%;
  padding: 10px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

/* Login Button */
.login-btn {
  background: #00e6e6;
  border: none;
  padding: 10px;
  border-radius: 20px;
  width: 95%;
  cursor: pointer;
}

/* Image */
img {
  width: 90%;
  max-width: 500px;
  border-radius: 10px;
  margin-top: 20px;
}

/* Footer */
footer {
  margin-top: 30px;
  font-size: 14px;
  color: #ccc;
}

/* Mobile */
@media(max-width:600px){
  h1 { font-size: 28px; }
}
</style>
</head>
