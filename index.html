<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Book 247</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
}

/* 🔥 PREMIUM HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 32px;
  font-weight: bold;
  background: linear-gradient(90deg,#FFD700,#FFA500);
  color: black;
  letter-spacing: 2px;
  text-shadow: 0 0 10px white;
}

/* SUB LINE */
.subline {
  text-align: center;
  background: red;
  padding: 8px;
  font-weight: bold;
  animation: scroll 10s linear infinite;
  white-space: nowrap;
}

@keyframes scroll {
  0% {transform: translateX(100%)}
  100% {transform: translateX(-100%)}
}

/* MAIN */
.main {
  background: #f1f1f1;
  border-radius: 25px;
  margin: 10px;
  padding: 15px;
  color: black;
}

/* GAMES */
.games {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card p {
  margin: 8px;
  font-weight: bold;
}

/* 💥 BIG BLINK WHATSAPP BUTTON */
.big-btn {
  display: block;
  width: 90%;
  margin: 20px auto;
  padding: 18px;
  font-size: 20px;
  border-radius: 15px;
  text-align: center;
  text-decoration: none;
  font-weight: bold;
  background: #25D366;
  color: white;
  animation: blink 1s infinite;
  box-shadow: 0 0 20px #25D366;
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.5;}
  100% {opacity:1;}
}

/* COUNTER */
.counter {
  text-align: center;
  margin: 20px;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: black;
  padding: 20px;
  border-radius: 10px;
  border: 2px solid gold;
  text-align: center;
}

.close {
  margin-top: 10px;
  padding: 8px 15px;
  background: red;
  color: white;
  border: none;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">💰 SILVER BOOK 247 💰</div>

<!-- MOVING LINE -->
<div class="subline">
🔥 Deposit 5% | New ID 20% | Refer 7% | Loss 2% | IPL Special 🔥
</div>

<!-- MAIN -->
<div class="main">

<div class="games">
<div class="card"><img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317"><p>Teen Patti</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1606167668584-78701c57f13d"><p>Dragon Tiger</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1511512578047-dfb367046420"><p>Andar Bahar</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1605902711622-cfb43c44367f"><p>Poker</p></div>
</div>

<!-- 💥 BIG WHATSAPP BUTTON -->
<a href="https://wa.me/+917347607874" class="big-btn">
📲 JOIN NOW ON WHATSAPP
</a>

</div>

<!-- COUNTER -->
<div class="counter">
<h3>👥 Users Online: <span id="users">1523</span></h3>
<h3>🔥 Joined Today: <span id="joins">320</span></h3>
</div>

<!-- WINNING -->
<div style="background:red;padding:10px;text-align:center;">
<span id="winnerText"></span>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h2>🔥 IPL ID AVAILABLE 🔥</h2>
    <p>Get Your ID Now</p>
    <a href="https://wa.me/+917347607874" class="big-btn">Join Now</a>
    <br>
    <button class="close" onclick="closePopup()">Close</button>
  </div>
</div>

<script>
// COUNTERS
let users=1523;
setInterval(()=>{users+=Math.floor(Math.random()*3);document.getElementById("users").innerText=users;},2000);

let joins=320;
setInterval(()=>{joins+=Math.floor(Math.random()*2);document.getElementById("joins").innerText=joins;},3000);

// WINNING
let names=["Rahul","Aman","Vikas","Rohit","Sahil"];
let amt=[5000,8000,12000,15000];
setInterval(()=>{
let n=names[Math.floor(Math.random()*names.length)];
let a=amt[Math.floor(Math.random()*amt.length)];
document.getElementById("winnerText").innerText="💰 "+n+" won ₹"+a+" just now!";
},2000);

// POPUP CLOSE
function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
