<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Book</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
  text-align:center;
}

/* Header */
header {
  padding:60px 20px 30px;
}
h1 {
  font-size:42px;
  color:#00e6e6;
}
.tagline {
  color:#aaa;
  font-size:16px;
}

/* Card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  margin:20px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  animation: fadeUp 1s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

/* Bonus */
.bonus {
  font-size:20px;
  color:#00e6e6;
}

/* Buttons */
.btn {
  display:block;
  margin:12px auto;
  padding:15px;
  width:80%;
  max-width:300px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(255,255,255,0.3);
}

.whatsapp { background:#25D366; }
.telegram { background:#0088cc; }
.instagram { background:#E1306C; }

/* Images */
.images {
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.images img {
  width:30%;
  min-width:120px;
  border-radius:12px;
  transition:0.3s;
}

.images img:hover {
  transform:scale(1.05);
}

/* Footer */
footer {
  margin-top:30px;
  color:#aaa;
  font-size:14px;
}

/* Mobile */
@media(max-width:600px){
  h1 { font-size:30px; }
  .images img { width:90%; }
}
</style>
</head>

<body>

<header>
  <h1>Silver Book</h1>
  <p class="tagline">Trusted • Fast • Secure Gaming Platform</p>
</header>

<div class="card">
  <p class="bonus">
    🎁 New ID Bonus: 20% <br>
    💰 Every Deposit Bonus: 5%
  </p>
</div>

<div class="card">
  <a class="btn whatsapp" href="https://wa.me/917347607874">Join on WhatsApp</a>
  <a class="btn telegram" href="https://t.me/silveronline24">Join on Telegram</a>
  <a class="btn instagram" href="https://www.instagram.com/silve_rbook2025">Follow Instagram</a>
</div>

<div class="card">
  <h3>🎰 Premium Casino Experience</h3>
  <div class="images">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420" loading="lazy">
    <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317" loading="lazy">
    <img src="https://images.unsplash.com/photo-1605902711622-cfb43c44367f" loading="lazy">
  </div>
</div>

<p style="font-size:13px; color:#777;">
⚠️ 18+ Only. Play responsibly.
</p>

<footer>
© 2026 Silver Book. All rights reserved.
</footer>

</body>
</html>
