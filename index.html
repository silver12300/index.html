<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Book 247</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
}

/* APP */
.app {
  max-width: 420px;
  margin: auto;
  background: #f3f3f3;
  border-radius: 28px;
  padding-bottom: 20px;
}

/* TOP BAR */
.topbar {
  margin: 12px;
  padding: 10px 12px;
  border-radius: 30px;
  background: linear-gradient(90deg,#7f00ff,#e100ff);
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.left img {
  width: 38px;
  height: 38px;
  border-radius: 50%;
}

.name {
  font-size: 14px;
  font-weight: 600;
}

/* GRID */
.games {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 6px 14px rgba(0,0,0,0.15);
}

.card img {
  width: 100%;
  height: 110px;
  object-fit: cover;
}

/* BUTTON */
.btn {
  margin: 12px;
  padding: 14px;
  background: #25D366;
  color: white;
  text-align: center;
  border-radius: 14px;
  font-weight: bold;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity:0.5;}
}

/* SECTION TITLE */
.section-title {
  padding: 10px 15px;
  font-size: 17px;
  font-weight: 600;
}

/* INFO BOX */
.info {
  margin: 10px 15px;
  padding: 15px;
  border-radius: 18px;
  background: #111;
  color: white;
}

.info h3 {
  color: gold;
  margin-bottom: 6px;
  font-size: 15px;
}

.info p {
  font-size: 13px;
  color: #ccc;
}
</style>

</head>

<body>

<div class="app">

<!-- TOP -->
<div class="topbar">
  <div class="left">
    <img src="https://i.imgur.com/8Km9tLL.png">
    <div class="name">💰 SILVER BOOK 247</div>
  </div>
  <div>🔗</div>
</div>

<!-- GAMES -->
<div class="games">
<div class="card"><img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1606167668584-78701c57f13d"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1511512578047-dfb367046420"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1605902711622-cfb43c44367f"></div>
</div>

<!-- BUTTON -->
<div class="btn">📲 JOIN NOW</div>

<!-- SECTION -->
<div class="section-title">Why Silver Book?</div>

<div class="info">
<h3>💎 Your Trust, Our Service</h3>
<p>India’s trusted gaming platform with active users.</p>
</div>

<div class="info">
<h3>⚡ Quality Assured</h3>
<p>Fast deposit & instant withdrawal system.</p>
</div>

<div class="info">
<h3>🏆 Loyalty Program</h3>
<p>Daily bonus and earning opportunities.</p>
</div>

</div>

</body>
</html>
