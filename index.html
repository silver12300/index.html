/* APP BOX */
.app {
  max-width: 420px;
  margin: auto;
  background: #f5f5f5;
  min-height: 100vh;
  border-radius: 25px;
  overflow: hidden;
}

/* HEADER */
.topbar {
  padding: 12px;
  background: linear-gradient(90deg,#9d50bb,#6e48aa);
  color: white;
  text-align: center;
  font-weight: bold;
}

/* 🔥 LOGO CENTER */
.logo-box {
  text-align: center;
  margin: 20px 0;
}

.logo-box img {
  width: 90%;
  max-width: 320px;
  filter: drop-shadow(0 0 15px silver);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

/* GAMES */
.games {
  display: grid;
  grid-template-columns: repeat(2,1fr);

  padding: 12px;

.card {

  border-radius: 15px;
  overflow: hidden;
}

.card img {

  height: 110px;
  object-fit: cover;
}

.card p {
  margin: 8px;
  font-weight: bold;
}

/* BIG BUTTON */
.big-btn {
  display: block;
  width: 90%;
  margin: 15px auto;
  padding: 16px;
  border-radius: 15px;
  text-align: center;
  font-weight: bold;
  background: #25D366;
  color: white;
  text-decoration: none;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity:0.5;}
}

/* COUNTER */
.counter {
  text-align: center;
  padding: 10px;
}

/* SECTION */
.section {
  padding: 15px;
}

.box {
  background: #111;
  color: white;
  padding: 12px;
  border-radius: 15px;
  margin: 10px 0;
}

/* SOCIAL */
.social a {

  margin: 8px;

  text-align: center;
  border-radius: 10px;
  color: white;
  text-decoration: none;
}

.telegram { background:#0088cc; }

/* TICKER */
